version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smarthome-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./smart_home/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: smarthome
      PGUSER: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready", "-d", "smarthome" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - smarthome-network

  temperature-api:
    build: ./temperature-api
    container_name: temperature_api
    ports:
      - "8081:8081"
    restart: always

  device-service:
    build: ./device-service
    container_name: device-service
    ports:
      - "8082:8082"
    networks:
      - smarthome-network

  telemetry-service:
    build: ./telemetry-service
    container_name: telemetry-service
    ports:
      - "8083:8083"
    networks:
      - smarthome-network

  app:
    build:
      context: ./smart_home
      dockerfile: Dockerfile
    container_name: smarthome-app
    depends_on:
      postgres:
        condition: service_healthy
      temperature-api:
        condition: service_started
      device-service:
        condition: service_started
      telemetry-service:
        condition: service_started
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/smarthome
      - TEMPERATURE_API_URL=http://temperature-api:8081
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - smarthome-network

volumes:
  postgres_data:

networks:
  smarthome-network:
    driver: bridge